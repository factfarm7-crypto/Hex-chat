<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex | Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen">
        <div class="bg-white p-8 border border-gray-300 w-80 text-center">
            <h1 class="text-4xl font-bold mb-8 italic">Hex</h1>
            <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-2 border border-gray-300 bg-gray-50 rounded-sm text-xs focus:outline-none focus:border-gray-400">
            <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-4 border border-gray-300 bg-gray-50 rounded-sm text-xs focus:outline-none focus:border-gray-400">
            <button id="btn-login" class="w-full bg-blue-500 text-white py-1 rounded font-semibold text-sm hover:bg-blue-600">Log In</button>
            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="mx-4 text-gray-400 text-xs font-semibold">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>
            <button id="btn-signup" class="text-blue-900 text-xs font-semibold">Sign up with Email</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <nav class="fixed top-0 w-full bg-white border-b border-gray-300 z-50">
            <div class="max-w-4xl mx-auto flex justify-between items-center h-14 px-4">
                <h1 class="text-2xl font-bold italic">Hex</h1>
                <div class="flex space-x-5 text-xl">
                    <i class="fa-solid fa-house cursor-pointer"></i>
                    <i class="fa-regular fa-paper-plane cursor-pointer"></i>
                    <i class="fa-regular fa-square-plus cursor-pointer" id="open-post-modal"></i>
                    <i class="fa-regular fa-compass cursor-pointer"></i>
                    <i class="fa-regular fa-heart cursor-pointer"></i>
                    <button id="btn-logout" class="text-sm font-semibold text-blue-500">Logout</button>
                </div>
            </div>
        </nav>

        <main class="pt-20 pb-10 max-w-lg mx-auto">
            <div id="feed-container" class="space-y-6">
                </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBF1c8eotfssxA6weC9B9hD_pOrpm4jQIQ",
            authDomain: "hex-chat-faaa5.firebaseapp.com",
            databaseURL: "https://hex-chat-faaa5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hex-chat-faaa5",
            storageBucket: "hex-chat-faaa5.firebasestorage.app",
            messagingSenderId: "900244800752",
            appId: "1:900244800752:web:31662e1d280b98a5f0ee35",
            measurementId: "G-YLYZT9TCY3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- Authentication Logic ---
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');

        document.getElementById('btn-signup').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
        };

        document.getElementById('btn-login').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                loadPosts();
            } else {
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // --- Realtime Data Logic ---
        function loadPosts() {
            const postsRef = ref(db, 'posts');
            onValue(postsRef, (snapshot) => {
                const data = snapshot.val();
                const feed = document.getElementById('feed-container');
                feed.innerHTML = ''; 
                
                for (let id in data) {
                    const post = data[id];
                    feed.innerHTML += `
                        <div class="bg-white border border-gray-300 rounded">
                            <div class="flex items-center p-3">
                                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-yellow-400 to-purple-600 p-0.5">
                                    <div class="w-full h-full bg-white rounded-full p-0.5">
                                        <img src="https://ui-avatars.com/api/?name=${post.author}" class="rounded-full">
                                    </div>
                                </div>
                                <span class="ml-3 font-semibold text-sm">${post.author}</span>
                            </div>
                            <img src="${post.imageUrl}" class="w-full">
                            <div class="p-3">
                                <div class="flex space-x-4 text-xl mb-2">
                                    <i class="fa-regular fa-heart cursor-pointer"></i>
                                    <i class="fa-regular fa-comment"></i>
                                    <i class="fa-regular fa-paper-plane"></i>
                                </div>
                                <p class="text-sm"><span class="font-semibold">${post.author}</span> ${post.caption}</p>
                            </div>
                        </div>
                    `;
                }
            });
        }
    </script>
</body>
</html>
